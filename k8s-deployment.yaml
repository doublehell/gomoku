apiVersion: v1
kind: Service
metadata:
  name: gomoku
  labels:
    app: gomoku
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app: gomoku

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gomoku
  labels:
    app: gomoku
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gomoku
  template:
    metadata:
      labels:
        app: gomoku
    spec:
      containers:
        - name: gomoku
          image: gomoku-online:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5